events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout 65;
  limit_req_zone $binary_remote_addr zone=ironmap:10m rate=30r/m;

  server {
    listen 80;
    server_name _;
    limit_req zone=ironmap burst=50 nodelay;

    # App at root — PWA works correctly here
    location / {
      root /usr/share/nginx/html;
      try_files $uri /index.html;
    }

    # Landing page at /landing
    location = /landing {
      root /usr/share/nginx/html;
      try_files /landing.html =404;
    }

    # Service worker — no-cache so updates propagate
    location = /sw.js {
      root /usr/share/nginx/html;
      add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # API
    location /api/ {
      proxy_pass http://api:3000/api/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /health {
      proxy_pass http://api:3000/health;
    }
  }
}
