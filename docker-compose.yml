# ============================================================
#  IronMap — Docker Compose Stack
# ============================================================
services:

  postgres:
    image: postgres:16-alpine
    container_name: fittrack-db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       fittrack
      POSTGRES_USER:     fittrack
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      TZ:                America/Chicago
    volumes:
      - /mnt/user/appdata/fittrack/postgres:/var/lib/postgresql/data
      - /mnt/user/appdata/fittrack/init:/docker-entrypoint-initdb.d
    networks:
      - fittrack-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fittrack -d fittrack"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: /mnt/user/appdata/fittrack/api
      dockerfile: Dockerfile
    container_name: fittrack-api
    restart: unless-stopped
    mem_limit: 384m
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      PORT:        3000
      DB_HOST:     postgres
      DB_PORT:     5432
      DB_NAME:     fittrack
      DB_USER:     fittrack
      DB_PASSWORD: ${DB_PASSWORD}
      CORS_ORIGIN: http://${UNRAID_IP}
      TZ:          America/Chicago
    networks:
      - fittrack-net
    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: fittrack-nginx
    restart: unless-stopped
    ports:
      - "8085:80"
    volumes:
      - /mnt/user/appdata/fittrack/www:/usr/share/nginx/html:ro
      - /mnt/user/appdata/fittrack/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /mnt/user/appdata/fittrack/nginx/.htpasswd:/etc/nginx/.htpasswd:ro
    networks:
      - fittrack-net
    depends_on:
      - api

  renpho:
    build:
      context: /mnt/user/appdata/fittrack/renpho
      dockerfile: Dockerfile
    container_name: fittrack-renpho
    restart: unless-stopped
    environment:
      TZ: America/Chicago
    networks:
      - fittrack-net
    depends_on:
      postgres:
        condition: service_healthy

networks:
  fittrack-net:
    driver: bridge
